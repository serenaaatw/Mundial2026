<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>

    <div class="contenedor">

        <div class="card">

            <h1>Registro</h1>

            <form method="POST">

                <label>Nombre</label>

                <input type="text"
                       name="nombre"
                       placeholder="Ingrese nombre..."
                       required>

                <label>Email</label>

                <input type="email"
                       name="email"
                       placeholder="Ingrese email..."
                       required>

                <label>Contraseña</label>

                <input type="password"
                       name="password"
                       placeholder="Ingrese contraseña..."
                       required>

                <button type="submit">
                    Registrarse
                </button>

            </form>

            <a href="{{ url_for('auth.login_route') }}">
                Ya tengo cuenta
            </a>

        </div>

    </div>

</body>
</html>
