<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldCup Manager</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>

    <div class="contenedor">

        <div class="card">

            <img
                src="{{ url_for('static', filename='img/logo.png') }}"
                class="logo"
            >

            <h1>Crear Cuenta</h1>

            {% if error %}
                <p class="error">
                    {{ error}}
                </p>
            {% endif %}

            <form action="{{ url_for('auth.register_route') }}"
                  method="POST">

                <input
                    type="text"
                    name="nombre"
                    placeholder="Nombre de Usuario"
                    required
                >

                <input
                    type="email"
                    name="email"
                    placeholder="Correo Electrónico"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                >

                <button type="submit">
                    Crear Cuenta
                </button>

            </form>

            <div class="links">
                ¿Ya tienes cuenta?
                <a href="{{ url_for('auth.login_route') }}">
                    Volver al Login
                </a>
            </div>

        </div>

    </div>

</body>
</html>
