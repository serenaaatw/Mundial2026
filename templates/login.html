<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldCup Manager</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>

    <div class="contenedor">

        <div class="card">

            <img
                src="{{ url_for('static', filename='img/logo.png') }}"
                class="logo"
            >

            <h1>Iniciar Sesión</h1>

            <form action="{{ url_for('auth.login_route') }}"
                  method="POST">

                <label>Usuario o Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Usuario o Email"
                    required
                >

                <label>Contraseña</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                >

                <button type="submit">
                    Iniciar Sesión
                </button>

            </form>

            <div class="links">
                ¿No tienes cuenta?
                <a href="{{ url_for('auth.register_route') }}">
                    Registrarse
                </a>
            </div>

        </div>

    </div>

</body>
</html>
